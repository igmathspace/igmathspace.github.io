<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAMC Time Table Manager</title>
    <style>
        /* =========================================
           1. PASTE YOUR HOME PAGE CSS STYLES HERE
           Copy the content of the <style> tag from your 
           main Home Page index.html and paste it below.
           ========================================= */
        
        /* TEMPORARY DEFAULT STYLES (Delete this section if you paste your own CSS above) */
        :root {
            --primary-color: #0056b3; /* Change this to your main website color */
            --bg-color: #f4f4f9;
            --text-color: #333;
            --box-bg: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        /* ========================================= */

        /* LAYOUT STYLES */
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            flex-grow: 1;
        }

        /* NAVIGATION BAR */
        .navbar {
            background-color: var(--primary-color);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .navbar a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-weight: bold;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        .home-btn {
            background-color: white;
            color: var(--primary-color) !important;
            padding: 8px 15px;
            border-radius: 4px;
        }

        /* SECTIONS & FRAMES */
        h1.page-title {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .section-frame {
            background-color: var(--box-bg);
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .section-frame h2 {
            margin-top: 0;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
            color: var(--primary-color);
        }

        /* BUTTONS */
        .action-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            text-decoration: none;
            font-size: 18px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
            box-sizing: border-box; /* Ensures padding doesn't break width */
        }

        .action-btn:hover {
            background-color: #003d80; /* Darker shade */
        }

        .action-btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
            color: #666666;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 20px;
            background-color: #333;
            color: white;
            margin-top: auto;
        }

    </style>
</head>
<body>

    <!-- NAVIGATION SECTION -->
    <nav class="navbar">
        <div>
            <!-- Add your other navigation links here if needed -->
            <span style="color:white; font-weight:bold;">IG MATH SPACE</span>
            <a href="#">Colleges</a>
            <a href="#">NAMC</a>
        </div>
        <!-- GO TO HOME BUTTON -->
        <a href="/" class="home-btn">Go to Home</a>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="container">
        <h1 class="page-title">Time Table Management</h1>

        <!-- SECTION 1: DATA ENTRY -->
        <div class="section-frame">
            <h2>Data Entry</h2>
            
            <!-- Button 1: Loads the file you renamed as dataentry.html -->
            <a href="dataentry.html" class="action-btn">
                1. Enter Time Table Data
            </a>

            <!-- Button 2: Placeholder for later use -->
            <button class="action-btn" disabled title="This feature will be activated later">
                2. Consolidated Time Table Data
            </button>
        </div>

        <!-- SECTION 2: FORMATS -->
        <div class="section-frame">
            <h2>Resources</h2>
            
            <!-- Button: Loads ttformat.html -->
            <a href="ttformat.html" class="action-btn" style="background-color: #28a745;">
                Time Table Format 
            </a>
        </div>

    </div>

    <!-- FOOTER -->
    <footer>
        <p>&copy; 2023 IG Math Space. All Rights Reserved.</p>
    </footer>

</body>
</html>
