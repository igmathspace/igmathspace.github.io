<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Photo Slideshow</title>
<style>
  :root{
    --navy:#0d1b3e;
    --blue-deep:#12295c;
    --blue:#1e4fa3;
    --blue-light:#4a7fd6;
    --sky:#e8f0fe;
    --gold:#f4b942;
    --white:#ffffff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    height:100%;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background:
      radial-gradient(circle at 15% 20%, rgba(74,127,214,0.25), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(244,185,66,0.15), transparent 40%),
      linear-gradient(160deg, var(--navy) 0%, var(--blue-deep) 55%, var(--blue) 100%);
    color:var(--white);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }

  /* faint math-symbol background pattern */
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
      radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size:28px 28px;
    pointer-events:none;
  }

  .stage{
    width:min(92vw, 920px);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:22px;
    z-index:1;
  }

  .header{
    text-align:center;
  }
  .header h1{
    font-size:1.6rem;
    letter-spacing:1px;
    font-weight:600;
    color:var(--white);
  }
  .header .accent{
    color:var(--gold);
  }
  .header p{
    margin-top:4px;
    font-size:0.85rem;
    color:var(--sky);
    opacity:0.7;
    letter-spacing:0.5px;
  }

  .frame{
    position:relative;
    width:100%;
    aspect-ratio:16/10;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:16px;
    box-shadow:0 20px 60px rgba(0,0,0,0.45), inset 0 0 0 1px rgba(255,255,255,0.03);
    overflow:hidden;
    backdrop-filter:blur(6px);
  }

  .slide{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    transition:opacity 0.9s ease;
    background:#0a1530;
  }
  .slide.active{opacity:1;}
  .slide img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
    display:block;
  }
  .slide .fallback{
    color:var(--sky);
    opacity:0.6;
    font-size:0.9rem;
    text-align:center;
    padding:20px;
  }

  .counter{
    position:absolute;
    top:14px;
    right:16px;
    background:rgba(13,27,62,0.65);
    border:1px solid rgba(255,255,255,0.15);
    padding:4px 12px;
    border-radius:20px;
    font-size:0.78rem;
    letter-spacing:0.5px;
    color:var(--gold);
  }

  .nav-btn{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(13,27,62,0.55);
    border:1px solid rgba(255,255,255,0.2);
    color:var(--white);
    width:42px;
    height:42px;
    border-radius:50%;
    cursor:pointer;
    font-size:1.2rem;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:background 0.2s, transform 0.2s;
  }
  .nav-btn:hover{
    background:var(--blue-light);
    transform:translateY(-50%) scale(1.08);
  }
  .nav-btn.prev{left:14px;}
  .nav-btn.next{right:14px;}

  .controls{
    display:flex;
    align-items:center;
    gap:18px;
  }
  .dots{
    display:flex;
    gap:8px;
  }
  .dot{
    width:9px;
    height:9px;
    border-radius:50%;
    background:rgba(255,255,255,0.25);
    cursor:pointer;
    transition:background 0.25s, transform 0.25s;
  }
  .dot.active{
    background:var(--gold);
    transform:scale(1.3);
  }

  .play-btn{
    background:transparent;
    border:1px solid rgba(255,255,255,0.3);
    color:var(--sky);
    padding:6px 16px;
    border-radius:20px;
    font-size:0.78rem;
    letter-spacing:0.5px;
    cursor:pointer;
    transition:background 0.2s, color 0.2s;
  }
  .play-btn:hover{
    background:var(--gold);
    color:var(--navy);
    border-color:var(--gold);
  }
</style>
</head>
<body>

<div class="stage">
  <div class="header">
    <h1>Photo <span class="accent">Slideshow</span></h1>
    <p>Kallikkandy &middot; Moments</p>
  </div>

  <div class="frame">
    <div class="counter"><span id="curIdx">1</span> / <span id="totalIdx">6</span></div>
    <button class="nav-btn prev" onclick="changeSlide(-1)">&#10094;</button>
    <button class="nav-btn next" onclick="changeSlide(1)">&#10095;</button>
    <div class="slides"></div>
  </div>

  <div class="controls">
    <div class="dots"></div>
    <button class="play-btn" id="playBtn" onclick="togglePlay()">Pause</button>
  </div>
</div>

<script>
  const fileIds = [
    "1H3DDygQsaLawboZSL88tdikvLyMT8rRA",
    "1Jia4fhxxv5D079lELit1mkhZeTw8lb7m",
    "19l-38xK9eToGVf3JKNlrT8DlCviL_mi3",
    "1LUcclf5nTeSnT1ORPlo8osckuEgW8Ys3",
    "1I7f8ICTMAE7gd1E_85cJT9No0_HbHUDb",
    "1YZ6m0FUZbrNbgJycglU0QsE4Rz6XaEYc"
  ];

  const slidesContainer = document.querySelector('.slides');
  const dotsContainer = document.querySelector('.dots');
  document.getElementById('totalIdx').textContent = fileIds.length;

  fileIds.forEach((id, i) => {
    const slide = document.createElement('div');
    slide.className = 'slide' + (i === 0 ? ' active' : '');
    slide.innerHTML =
      '<img src="https://lh3.googleusercontent.com/d/' + id + '=w1600"' +
      ' onerror="this.onerror=null; this.src=\'https://drive.google.com/uc?export=view&id=' + id + '\';"' +
      ' alt="photo ' + (i+1) + '">';
    slidesContainer.appendChild(slide);

    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.onclick = () => goToSlide(i);
    dotsContainer.appendChild(dot);
  });

  let current = 0;
  let playing = true;
  let timer;

  const slideEls = () => document.querySelectorAll('.slide');
  const dotEls = () => document.querySelectorAll('.dot');

  function showSlide(idx){
    const slides = slideEls();
    const dots = dotEls();
    slides.forEach(s => s.classList.remove('active'));
    dots.forEach(d => d.classList.remove('active'));
    current = (idx + slides.length) % slides.length;
    slides[current].classList.add('active');
    dots[current].classList.add('active');
    document.getElementById('curIdx').textContent = current + 1;
  }

  function changeSlide(dir){
    showSlide(current + dir);
    resetTimer();
  }

  function goToSlide(i){
    showSlide(i);
    resetTimer();
  }

  function startTimer(){
    timer = setInterval(() => showSlide(current + 1), 4000);
  }

  function resetTimer(){
    clearInterval(timer);
    if(playing) startTimer();
  }

  function togglePlay(){
    playing = !playing;
    const btn = document.getElementById('playBtn');
    if(playing){
      btn.textContent = 'Pause';
      startTimer();
    } else {
      btn.textContent = 'Play';
      clearInterval(timer);
    }
  }

  document.addEventListener('keydown', (e) => {
    if(e.key === 'ArrowLeft') changeSlide(-1);
    if(e.key === 'ArrowRight') changeSlide(1);
  });

  startTimer();
</script>

</body>
</html>
