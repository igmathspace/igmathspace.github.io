<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Gafoor I</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .contact-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .contact-container h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .designation {
            color: #667eea;
            font-size: 18px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .department {
            color: #555;
            margin-bottom: 5px;
        }
        .college {
            color: #555;
            margin-bottom: 20px;
        }
        .email {
            background: #f0f0f0;
            padding: 12px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 16px;
            color: #333;
            word-break: break-all;
        }
        .email a {
            color: #667eea;
            text-decoration: none;
        }
        .social-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        .social-btn {
            display: inline-block;
            padding: 12px 24px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.3s, background 0.3s;
        }
        .social-btn:hover {
            background: #764ba2;
            transform: translateY(-3px);
        }
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background: #ccc;
            color: #333;
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.3s;
        }
        .back-btn:hover {
            background: #bbb;
        }
        hr {
            margin: 20px 0;
            border: none;
            border-top: 2px solid #eee;
        }
    </style>
</head>
<body>
    <div class="contact-container">
        <h1>📧 Gafoor I</h1>
        <div class="designation">Assistant Professor</div>
        <div class="department">Department of Mathematics</div>
        <div class="college">NAM College Kallikkandy</div>
        
        <div class="email">
            📧 <a href="mailto:gafoorbabui@gmail.com">gafoorbabui@gmail.com</a>
        </div>
        
        <hr>
        
        <div class="social-links">
            <a href="https://www.facebook.com/gafoor.babu.71" target="_blank" class="social-btn">📘 Facebook</a>
            <a href="https://www.instagram.com/g.babu.i/" target="_blank" class="social-btn">📷 Instagram</a>
            <a href="https://wa.link/q4zjoh" target="_blank" class="social-btn">💬 WhatsApp</a>
            <a href="https://igbookspace.blogspot.com/" target="_blank" class="social-btn">📝 Blog</a>
        </div>
        
        <a href="javascript:history.back()" class="back-btn">← Back to Home</a>
    </div>
</body>
</html>
